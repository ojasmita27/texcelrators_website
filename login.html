<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Texcelerators</title>
    <link rel="stylesheet" href="login-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Background Animation -->
    <div class="background-decoration">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <!-- Login Container -->
    <div class="login-container">
        <!-- Header -->
        <div class="login-header">
            <a href="index.html" class="back-button" id="backButton" title="Back to Home" aria-label="Go Back">
                <i class="fas fa-arrow-left"></i>
            </a>
            <h1 class="login-title">
                <span class="brand-icon">⚡</span>
                Texcelerators
            </h1>
            <p class="login-subtitle">Member Portal</p>
        </div>

        <!-- Glass Card -->
        <div class="glass-card">
            <!-- Member Only Note -->
            <div class="member-note">
                <i class="fas fa-lock"></i>
                <span>This portal is only for Texcelerators members</span>
            </div>

            <!-- Login Form -->
            <form class="login-form" id="loginForm">
                <!-- Email Input -->
                <div class="form-group">
                    <label for="email" class="form-label">
                        <i class="fas fa-envelope"></i>
                        Email Address
                    </label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        class="form-input"
                        placeholder="your@email.com"
                        required
                    >
                    <span class="input-border"></span>
                </div>

                <!-- Password Input -->
                <div class="form-group">
                    <label for="password" class="form-label">
                        <i class="fas fa-lock"></i>
                        Password
                    </label>
                    <div class="password-wrapper">
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            class="form-input"
                            placeholder="Enter your password"
                            required
                        >
                        <button type="button" class="toggle-password" id="togglePassword" title="Show/Hide">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <span class="input-border"></span>
                </div>

                <!-- Role Select -->
                <div class="form-group">
                    <label for="loginRole" class="form-label">
                        <i class="fas fa-user-tag"></i>
                        Login As
                    </label>
                    <select id="loginRole" name="loginRole" class="form-input" required>
                        <option value="member" selected>Member</option>
                        <option value="admin">Admin</option>
                    </select>
                    <span class="input-border"></span>
                </div>

                <!-- Remember Me -->
                <div class="form-checkbox">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember">Keep me signed in</label>
                </div>

                <!-- Login Button -->
                <button type="submit" class="login-button">
                    <span>Sign In</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <!-- Force Password Change (shown only when required) -->
            <form class="login-form" id="changePasswordForm" style="display: none; margin-top: 1rem;">
                <div class="member-note" style="margin-bottom: 1rem;">
                    <i class="fas fa-key"></i>
                    <span>First login detected. Please change your password.</span>
                </div>

                <div class="form-group">
                    <label for="newPassword" class="form-label">
                        <i class="fas fa-lock"></i>
                        New Password
                    </label>
                    <input
                        type="password"
                        id="newPassword"
                        name="newPassword"
                        class="form-input"
                        placeholder="Enter a new password"
                        minlength="6"
                        required
                    >
                    <span class="input-border"></span>
                </div>

                <div class="form-group">
                    <label for="confirmNewPassword" class="form-label">
                        <i class="fas fa-lock"></i>
                        Confirm New Password
                    </label>
                    <input
                        type="password"
                        id="confirmNewPassword"
                        name="confirmNewPassword"
                        class="form-input"
                        placeholder="Re-enter new password"
                        minlength="6"
                        required
                    >
                    <span class="input-border"></span>
                </div>

                <button type="submit" class="login-button">
                    <span>Update Password</span>
                    <i class="fas fa-check"></i>
                </button>
            </form>

            <!-- Divider -->
            <div class="divider">
                <span>Need Help?</span>
            </div>

            <!-- Support Links -->
            <div class="support-links">
                <a href="#" class="support-link" onclick="handleForgotPassword(event)">
                    <i class="fas fa-key"></i>
                    Forgot Password?
                </a>
                <a href="#" class="support-link" onclick="handleContactAdmin(event)">
                    <i class="fas fa-headset"></i>
                    Contact Admin
                </a>
            </div>

            <!-- Footer Info -->
            <div class="login-footer">
                <p>
                    Not a member? 
                    <a href="index.html" class="footer-link">Join us</a>
                </p>
            </div>
        </div>

        <!-- Security Badge -->
        <div class="security-badge">
            <i class="fas fa-shield-alt"></i>
            <span>Secure Connection</span>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>

    <script src="login-script.js"></script>
</body>
</html>
